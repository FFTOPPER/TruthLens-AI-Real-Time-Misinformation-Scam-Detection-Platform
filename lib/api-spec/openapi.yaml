openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Text analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analysis/analyze:
    post:
      operationId: analyzeText
      tags: [analysis]
      summary: Analyze text for misinformation
      description: Analyze input text for credibility, risk level, suspicious phrases, and manipulation technique breakdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeTextBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get recent analysis history
      description: Returns the last 20 analyses performed
      responses:
        "200":
          description: List of past analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisRecord"

  /analysis/stats:
    get:
      operationId: getAnalysisStats
      tags: [analysis]
      summary: Get analysis statistics
      description: Returns aggregate stats - total analyses, risk distribution, avg credibility
      responses:
        "200":
          description: Stats object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AnalyzeTextBody:
      type: object
      properties:
        text:
          type: string
          description: The text or content to analyze
      required:
        - text

    ManipulationBreakdown:
      type: object
      description: Scores (0-100) for each detected manipulation technique
      properties:
        fear:
          type: number
          description: Fear tactics score (0-100)
        urgency:
          type: number
          description: Urgency language score (0-100)
        emotionalTriggers:
          type: number
          description: Emotional trigger score (0-100)
        fakeAuthority:
          type: number
          description: Fake authority signals score (0-100)
      required:
        - fear
        - urgency
        - emotionalTriggers
        - fakeAuthority

    AnalysisResult:
      type: object
      properties:
        credibilityScore:
          type: number
          description: Score from 0 to 100 (100 = fully credible)
        riskLevel:
          type: string
          enum: [Low, Medium, High]
        explanation:
          type: string
          description: Human-readable explanation of the analysis
        suspiciousPhrases:
          type: array
          items:
            type: string
          description: List of suspicious phrases found in the text
        manipulationBreakdown:
          $ref: "#/components/schemas/ManipulationBreakdown"
        id:
          type: string
          description: Record ID for history tracking
      required:
        - credibilityScore
        - riskLevel
        - explanation
        - suspiciousPhrases
        - manipulationBreakdown
        - id

    AnalysisRecord:
      type: object
      properties:
        id:
          type: string
        textSnippet:
          type: string
          description: First 200 chars of analyzed text
        credibilityScore:
          type: number
        riskLevel:
          type: string
          enum: [Low, Medium, High]
        explanation:
          type: string
        suspiciousPhrases:
          type: array
          items:
            type: string
        manipulationBreakdown:
          $ref: "#/components/schemas/ManipulationBreakdown"
        analyzedAt:
          type: string
          format: date-time
      required:
        - id
        - textSnippet
        - credibilityScore
        - riskLevel
        - explanation
        - suspiciousPhrases
        - manipulationBreakdown
        - analyzedAt

    AnalysisStats:
      type: object
      properties:
        totalAnalyses:
          type: integer
        avgCredibilityScore:
          type: number
        riskDistribution:
          type: object
          properties:
            Low:
              type: integer
            Medium:
              type: integer
            High:
              type: integer
          required: [Low, Medium, High]
      required:
        - totalAnalyses
        - avgCredibilityScore
        - riskDistribution
